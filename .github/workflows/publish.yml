name: Publish Release

on:
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*'

jobs:
  publish:
    if: github.ref_type == 'tag' && startsWith(github.ref_name, '21') && github.event.base_ref == 'refs/heads/java-21'
    uses: sava-software/sava-build/.github/workflows/publish.yml@main
    secrets: inherit
    permissions:
      contents: read
      packages: write
